title: p3l6.dev
email: me@p3l6.dev
description: Paul Landers' hobbies and software
logo: /assets/icon/boat-round.svg

url: "https://p3l6.dev"
baseurl: ""

markdown: kramdown
permalink: pretty
timezone: America/New_York
future: true

plugins:
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-sitemap

exclude:
  - rakefile
  - Readme.md
  - "**/*.typ"
  - CNAME
  - LICENSE
  - "**/makefile"
  - "**/*.sh"
  - "dev/ref/.util/*"

collections:
  recipes:
    output: true
  wwdc:
    output: true

feed:
  collections:
    - recipes

defaults:
  - scope:
      type: pages
    values:
      layout: page
  - scope:
      type: posts
    values:
      layout: post
      author: Paul Landers
      selectedNav: /blog/
  - scope:
      type: recipes
    values:
      layout: indexable
      index: /cook/
      author: Paul Landers
      selectedNav: /cook/
  - scope:
      type: wwdc
    values:
      layout: indexable
      index: /dev/wwdc/
  - scope:
      path: dev/ref/
    values:
      layout: indexable
      index: /dev/ref/

navigation_items:
  - title: Home
    url: "/"
  - title: Now
    url: "/about/now/"
  - title: Hobbies
    url: "/about/hobbies/"
    divide: true
  - title: Blog
    url: "/blog/"
  - title: Recipes
    url: "/cook/"
    divide: true
  - title: Resume
    url: "/resume/"
  - title: Contact
    url: "/about/card/"
    divide: true
  - title: Blueprint
    url: "/pages/blueprint/"
