<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">

<svg xmlns="http://www.w3.org/2000/svg" version="1.1"
  width="1024px" height="1024px"
  viewBox="0,0,80,80">

<defs>
  <clipPath id="bg-clip">
    <!-- rx: 15 for round rect, 40 for circle -->
    <rect x="0" y="0" width="80" height="80" rx="0"/><!-- CLIP -->
  </clipPath>

  <linearGradient id="sky-gradient">
    <stop stop-color="#75C0F7" offset="0"/>
    <stop stop-color="#ABD7F9" offset="1"/>
  </linearGradient>

  <linearGradient id="wave-gradient"
    x1="0%" x2="0%" y1="0%" y2="100%">
    <stop stop-color="#30668B" offset="0"/>
    <stop stop-color="#214C6A" offset="1"/>
  </linearGradient>

  <radialGradient id="sail-gradient"
    cx="54" cy="16" r="20"
    gradientUnits="userSpaceOnUse">
    <stop stop-color="#F1F6FC" offset="0"/>
    <stop stop-color="#CDD1D8" offset="1"/>
  </radialGradient>
</defs>

<!-- sky -->
<rect
  width="80" height="80"
  fill="url(#sky-gradient)"
  clip-path="url(#bg-clip)"/>

<!-- water-->
<circle
  cx="40" cy="168" r="125"
  fill="#448ABC"
  clip-path="url(#bg-clip)"/>

<!-- boat: mast -->
<line
  x1="46" y1="51" x2="48" y2="5"
  stroke="#643D20"
  stroke-width="5"
  stroke-linecap="round"/>

<!-- boat: outline -->
<path
  d="M 10 45
     L 05 44
     M 70 45
     L 75 44
     M 10 45
     Q 40 51 70 45
     C 75 45 70 64 60 64
     L 20 64
     C 10 64 05 45 10 45"
  fill="none"
  stroke="#402715"
  stroke-width="4"
  stroke-linecap="round"
  stroke-linejoin="round"/>

<!-- boat: fill -->
<path
  d="M 10 44
     Q 40 50 70 44
     C 75 45 70 64 60 64
     L 20 64
     C 10 64 05 45 10 44"
  fill="#643D20"/>

<!-- boat: detail -->
<path
  d="M 12 48
     Q 40 54 68 48
     M 13 52
     Q 40 58 67 52"
  fill="none"
  stroke="#402715"
  stroke-width="0.5"
  stroke-linecap="round"/>

<!-- sail -->
<path
  d="M 25 8
     C 34 3 58 6 64 9
     C 70 12 68 40 62 43
     C 60 30 40 30 20 43
     C 50 15 16 13 25 8 Z"
  stroke="#2A2E33"
  stroke-width="0.5"
  fill="url(#sail-gradient)"
  stroke-linejoin="round"/>

<!-- wave -->
<path
  d="M 0 80
     L 0 54
     C 10 56 10 62 20 60
     C 30 58 30 64 40 62
     C 50 60 50 58 60 60
     C 70 62 70 64 80 60
     L 80 80 Z"
  fill="url(#wave-gradient)"
  clip-path="url(#bg-clip)"/>

</svg>
